<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksi Komponen Tombol Bootstrap</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            padding: 50px;
            background-color: #f8f9fa;
        }
        .section-title {
            margin-top: 30px;
            margin-bottom: 20px;
            border-left: 5px solid #0d6efd;
            padding-left: 15px;
        }
        .btn-showcase {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="mb-4 text-center">Implementasi Komponen Tombol</h1>

        <div class="btn-showcase">
            <h3 class="section-title">Varian Warna Standar</h3>
            <div class="d-flex flex-wrap gap-2 mb-4">
                <button type="button" class="btn btn-primary">Primary</button>
                <button type="button" class="btn btn-secondary">Secondary</button>
                <button type="button" class="btn btn-success">Success</button>
                <button type="button" class="btn btn-danger">Danger</button>
                <button type="button" class="btn btn-warning">Warning</button>
                <button type="button" class="btn btn-info">Info</button>
                <button type="button" class="btn btn-light">Light</button>
                <button type="button" class="btn btn-dark">Dark</button>
                <button type="button" class="btn btn-link">Link</button>
            </div>

            <h3 class="section-title">Varian Outline</h3>
            <div class="d-flex flex-wrap gap-2 mb-4">
                <button type="button" class="btn btn-outline-primary">Primary Outline</button>
                <button type="button" class="btn btn-outline-secondary">Secondary Outline</button>
                <button type="button" class="btn btn-outline-success">Success Outline</button>
                <button type="button" class="btn btn-outline-danger">Danger Outline</button>
            </div>

            <h3 class="section-title">Ukuran & Status</h3>
            <div class="d-flex align-items-center flex-wrap gap-3 mb-4">
                <button type="button" class="btn btn-primary btn-lg">Large Button</button>
                <button type="button" class="btn btn-primary">Normal Button</button>
                <button type="button" class="btn btn-primary btn-sm">Small Button</button>
                <button type="button" class="btn btn-secondary" disabled>Disabled State</button>
            </div>

            <h3 class="section-title">Block Level (Full Width)</h3>
            <div class="d-grid gap-2">
                <button class="btn btn-primary" type="button">Tombol Aksi Utama</button>
                <button class="btn btn-outline-secondary" type="button">Batalkan Transaksi</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
